<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Windows Log Toolkit</title>
  <desc id="desc">Minimal banner for a GitHub repository about extracting and cleaning Windows logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="220" y1="80" x2="1380" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0.20"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1360" cy="90" r="120" fill="#1E293B" opacity="0.55"/>
  <circle cx="1455" cy="320" r="150" fill="#0B1220" opacity="0.8"/>
  <circle cx="180" cy="360" r="120" fill="#111827" opacity="0.65"/>

  <g opacity="0.9">
    <rect x="88" y="92" width="172" height="172" rx="26" fill="#0B1220" stroke="#334155"/>
    <rect x="116" y="130" width="116" height="18" rx="9" fill="#60A5FA" opacity="0.95"/>
    <rect x="116" y="164" width="78" height="12" rx="6" fill="#CBD5E1" opacity="0.9"/>
    <rect x="116" y="190" width="96" height="12" rx="6" fill="#94A3B8" opacity="0.72"/>
    <rect x="116" y="216" width="64" height="12" rx="6" fill="#94A3B8" opacity="0.52"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1115" y="115" width="290" height="170" rx="26" fill="#0B1220" stroke="#334155"/>
    <circle cx="1160" cy="155" r="8" fill="#60A5FA"/>
    <rect x="1180" y="147" width="160" height="16" rx="8" fill="#E2E8F0" opacity="0.95"/>
    <rect x="1160" y="190" width="180" height="12" rx="6" fill="#94A3B8" opacity="0.75"/>
    <rect x="1160" y="218" width="130" height="12" rx="6" fill="#94A3B8" opacity="0.55"/>
    <rect x="1160" y="246" width="95" height="12" rx="6" fill="#94A3B8" opacity="0.38"/>
  </g>

  <path d="M290 178C462 178 515 128 642 128C767 128 811 226 942 226C1055 226 1093 190 1110 180" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>

  <text x="320" y="168" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="0.2">Windows Log Toolkit</text>
  <text x="320" y="214" fill="#93C5FD" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">Extract diagnostics first. Clean logs only when needed.</text>
  <text x="320" y="270" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="400">Batch scripts for fast troubleshooting, raw exports, crash dump collection, and intentional Event Viewer cleanup.</text>

  <g opacity="0.92">
    <rect x="322" y="312" width="154" height="38" rx="19" fill="#172554" stroke="#2563EB"/>
    <text x="349" y="336" fill="#DBEAFE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="600">Extract logs</text>
    <rect x="492" y="312" width="136" height="38" rx="19" fill="#0B1220" stroke="#334155"/>
    <text x="522" y="336" fill="#E2E8F0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="600">Clean logs</text>
  </g>
</svg>
